<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;background:#111"><div id="out">loading</div>
<script>
const pages=["index.html","contact.html","work.html","projects.html","approach.html","fieldlog.html","brand.html","projects/edgesync.html","projects/atlasdeploy.html","projects/pulse.html","projects/fieldconsole.html","projects/quoteforge.html","projects/recon.html"];
const B="http://127.0.0.1:4174/portfolio-v2/";
const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-wrap:wrap';document.body.appendChild(wrap);const fr={};
pages.forEach(p=>{const f=document.createElement('iframe');f.src=B+p;f.style.cssText='width:375px;height:1400px;border:1px solid #333;margin:4px';fr[p]=f;wrap.appendChild(f);});
function go(){const res={};pages.forEach(p=>{const f=fr[p];const d=f.contentDocument;try{const sb=d.querySelectorAll('.social-box');const li=d.querySelector('.social-box.li a, a.social-box.li');res[p]={scrollW:d.documentElement.scrollWidth,sbCount:sb.length,li:!!d.querySelector('.social-box.li'),gh:!!d.querySelector('.social-box.gh'),em:!!d.querySelector('.social-box.em'),liHref:(d.querySelector('.social-box.li')||{}).href||''};}catch(e){res[p]={err:String(e)};}});document.getElementById('out').textContent=JSON.stringify(res,null,0);}
setTimeout(go,5000);
</script></body></html>
